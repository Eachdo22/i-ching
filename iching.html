<!DOCTYPE html>
<html>
<head>
<title>I Ching</title> 
<link rel="stylesheet" href="style.css">  
</head>
<body>

<h1>Book of Changes</h1>
<h2>All things are impermanent.</h2>
<p></p>
<div id="askDiv">
    <p id="askP">Ask a question.<br><i>Hint: Be specific but open-ended. Avoid yes/no questions.</i></p>
    <textarea id="userQuestion" name="userQuestion" cols="30" rows="3" placeholder="Enter your question..."></textarea>
    <button id="askButton" onclick="askQuestion()">Ask</button>
</div>

<div id="tossContainer" class="grid">
    <div>
        <p id="tossBtnMessage">Focus on your question and toss the coins.</p>
        <button id="tossButton" onclick="multipleFunctions()">Toss Coins</button>
    </div>
    <div id="lineValues">    
    </div>
</div>

<div class="grid" id="hexagramContainer">
    <h2 id="hexagramName"></h2>
    <p id="hexagramImage"></p>
    <p id="hexagramJudgement"></p>
    <p id="hexagramJudgementDescription"></p>
</div>





<script src="iChing.js"></script>
</body>
</html>
